name: Generate daily thesis monitor

on:
  schedule:
    # 12:00 America/New_York every day:
    # 16:00 UTC during EDT, 17:00 UTC during EST.
    - cron: "0 16 * * *"
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      openai_model:
        description: "OpenAI model to use for world-news GPT review"
        required: false
        default: "gpt-5-mini"
        type: string
      commit_changes:
        description: "Commit refreshed thesis_monitor.json back to the repo"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.window.outputs.should_run }}
      ny_time: ${{ steps.window.outputs.ny_time }}

    steps:
      - name: Resolve thesis-monitor schedule window
        id: window
        env:
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          if os.getenv("GITHUB_EVENT_NAME") != "schedule":
              print("should_run=true")
              print("ny_time=manual")
              print("event_schedule=manual")
          else:
              now = datetime.now(ZoneInfo("America/New_York"))
              schedule = os.getenv("GITHUB_EVENT_SCHEDULE", "")
              utc_offset_hours = int(now.utcoffset().total_seconds() // 3600)
              expected_schedule = "0 16 * * *" if utc_offset_hours == -4 else "0 17 * * *"
              should_run = schedule == expected_schedule
              print(f"should_run={'true' if should_run else 'false'}")
              print(f"ny_time={now.isoformat()}")
              print(f"event_schedule={schedule}")
          PY

      - name: Skip outside thesis-monitor window
        if: steps.window.outputs.should_run != 'true'
        run: |
          echo "Skipping thesis monitor outside the active daily schedule. Current NY time: ${{ steps.window.outputs.ny_time }}. Triggered cron: ${{ steps.window.outputs.event_schedule }}"

  thesis-monitor:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Log provider configuration
        env:
          MARKETAUX_API_TOKEN: ${{ secrets.MARKETAUX_API_TOKEN }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY || secrets.TWELVE_DATA_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY || secrets.ALPHA_VANTAGE_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT || 'weekly-stock-pick/1.0 contact=unknown' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [[ -z "${MARKETAUX_API_TOKEN}" ]]; then
            echo "WARN: MARKETAUX_API_TOKEN is missing. Thesis monitoring will rely on fallback news sources."
          fi
          if [[ -z "${OPENAI_API_KEY}" ]]; then
            echo "WARN: OPENAI_API_KEY is missing. Sector analysis will degrade to neutral fallback."
          fi
          if [[ -z "${TWELVEDATA_API_KEY}" ]]; then
            echo "WARN: TWELVEDATA_API_KEY is missing. Price data may fall back to Alpha Vantage or Stooq."
          fi
          if [[ -z "${ALPHA_VANTAGE_API_KEY}" ]]; then
            echo "WARN: ALPHA_VANTAGE_API_KEY is missing. Secondary news and price fallback capacity will be reduced."
          fi
          if [[ -z "${FINNHUB_API_KEY}" ]]; then
            echo "INFO: FINNHUB_API_KEY is missing. Optional Finnhub company-news fallback will be skipped."
          fi
          if [[ "${SEC_USER_AGENT}" == *"contact=unknown"* ]]; then
            echo "WARN: SEC_USER_AGENT is using the placeholder value. Set the repository variable for declared SEC EDGAR access."
          fi

      - name: Generate thesis_monitor.json
        working-directory: backend
        env:
          ENABLE_PERSISTENT_PROVIDER_LEDGER: "true"
          PIPELINE_PROVIDER_LEDGER_PATH: "provider_budget_ledger.json"
          MARKETAUX_API_TOKEN: ${{ secrets.MARKETAUX_API_TOKEN }}
          ALLOW_MARKETAUX_FALLBACK: "true"
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY || secrets.TWELVE_DATA_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY || secrets.ALPHA_VANTAGE_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          ENABLE_SEC_EDGAR_NEWS: "true"
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT || 'weekly-stock-pick/1.0 contact=unknown' }}
          SEC_EDGAR_COMPANY_FILINGS_LIMIT: "3"
          FINNHUB_COMPANY_NEWS_LIMIT: "6"
          FINNHUB_REQUEST_INTERVAL_SECONDS: "1.1"
          SEC_REQUEST_INTERVAL_SECONDS: "0.15"
          COMPANY_NEWS_PROVIDER_MODE: "blended"
          COMPANY_NEWS_SHORTLIST_SIZE: "60"
          ENABLE_COMPANY_LLM_REVIEW: "true"
          COMPANY_LLM_ARTICLE_LIMIT: "5"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.openai_model || 'gpt-5-mini' }}
          ALLOW_LLM_FALLBACK: "true"
          MARKETAUX_NEWS_LIMIT: "3"
          MARKETAUX_GLOBAL_NEWS_LIMIT: "3"
          GDELT_GLOBAL_NEWS_LIMIT: "20"
          ALPHA_VANTAGE_GLOBAL_NEWS_LIMIT: "20"
          SECTOR_LLM_ARTICLE_LIMIT: "16"
          ALPHA_VANTAGE_COMPANY_REQUEST_INTERVAL_SECONDS: "12"
          ALPHA_VANTAGE_MAX_COMPANY_REQUESTS: "2"
          ALLOW_STOOQ_FALLBACK: "false"
          ALPHA_VANTAGE_REQUEST_INTERVAL_SECONDS: "12"
          ALPHA_VANTAGE_MAX_PRICE_REQUESTS: "2"
        run: python generate_thesis_monitor.py

      - name: Validate thesis monitor contract
        working-directory: backend
        run: >
          python -c "from pathlib import Path;
          from validate_outputs import load_json, validate_thesis_monitor_payload;
          validate_thesis_monitor_payload(load_json(Path('thesis_monitor.json')));
          print('thesis_monitor.json contract is valid.')"

      - name: Upload thesis monitor artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-thesis-monitor-${{ github.run_number }}
          path: |
            backend/thesis_monitor.json
            backend/provider_budget_ledger.json
          if-no-files-found: ignore

      - name: Commit and push if changed
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.commit_changes == 'true'
        run: |
          if [[ -n "$(git status --porcelain backend/thesis_monitor.json backend/provider_budget_ledger.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add backend/thesis_monitor.json backend/provider_budget_ledger.json
            git commit -m "Update thesis monitor [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
