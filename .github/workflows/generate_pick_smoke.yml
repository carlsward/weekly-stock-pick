name: Generate weekly stock pick smoke test

on:
  workflow_dispatch:
    inputs:
      openai_model:
        description: "OpenAI model to use for world-news GPT review"
        required: false
        default: "gpt-5-mini"
        type: string
      company_news_limit:
        description: "Marketaux articles per company"
        required: false
        default: "3"
        type: string
      global_news_limit:
        description: "Broad world-news articles fetched"
        required: false
        default: "30"
        type: string
      sector_llm_article_limit:
        description: "World-news articles sent to GPT"
        required: false
        default: "15"
        type: string

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: python -m unittest discover -s backend/tests -t .

      - name: Generate news_scores.json
        working-directory: backend
        env:
          UNIVERSE_CSV_PATH: universe_test.csv
          MARKETAUX_FIXTURE_PATH: fixtures/marketaux_smoke_news.json
          MARKETAUX_API_TOKEN: ${{ secrets.MARKETAUX_API_TOKEN }}
          ALLOW_MARKETAUX_FALLBACK: "true"
          COMPANY_NEWS_PROVIDER_MODE: "blended"
          MARKETAUX_NEWS_LIMIT: ${{ github.event.inputs.company_news_limit || '3' }}
        run: python generate_news_scores.py

      - name: Generate sector_scores.json
        working-directory: backend
        env:
          UNIVERSE_CSV_PATH: universe_test.csv
          MARKETAUX_GLOBAL_FIXTURE_PATH: fixtures/marketaux_smoke_global.json
          MARKETAUX_API_TOKEN: ${{ secrets.MARKETAUX_API_TOKEN }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY || secrets.ALPHA_VANTAGE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ github.event.inputs.openai_model || 'gpt-5-mini' }}
          ALLOW_LLM_FALLBACK: "true"
          ALLOW_MARKETAUX_FALLBACK: "true"
          MARKETAUX_GLOBAL_NEWS_LIMIT: ${{ github.event.inputs.global_news_limit || '30' }}
          SECTOR_LLM_ARTICLE_LIMIT: ${{ github.event.inputs.sector_llm_article_limit || '15' }}
        run: python generate_sector_scores.py

      - name: Generate current_pick.json and risk_picks.json
        working-directory: backend
        env:
          UNIVERSE_CSV_PATH: universe_test.csv
          ENABLE_HISTORY_REALIZED_ENRICHMENT: "false"
          FORCE_PRICE_FALLBACK: "true"
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY || secrets.TWELVE_DATA_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY || secrets.ALPHA_VANTAGE_API_KEY }}
        run: python generate_pick.py

      - name: Generate thesis_monitor.json
        working-directory: backend
        env:
          UNIVERSE_CSV_PATH: universe_test.csv
          MARKETAUX_FIXTURE_PATH: fixtures/marketaux_smoke_news.json
          MARKETAUX_GLOBAL_FIXTURE_PATH: fixtures/marketaux_smoke_global.json
          MARKETAUX_API_TOKEN: ${{ secrets.MARKETAUX_API_TOKEN }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY || secrets.TWELVE_DATA_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY || secrets.ALPHA_VANTAGE_API_KEY }}
          COMPANY_NEWS_PROVIDER_MODE: "blended"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ github.event.inputs.openai_model || 'gpt-5-mini' }}
          ALLOW_LLM_FALLBACK: "true"
          ALLOW_MARKETAUX_FALLBACK: "true"
          FORCE_PRICE_FALLBACK: "true"
          MARKETAUX_GLOBAL_NEWS_LIMIT: "20"
          GDELT_GLOBAL_NEWS_LIMIT: "12"
          ALPHA_VANTAGE_GLOBAL_NEWS_LIMIT: "12"
          SECTOR_LLM_ARTICLE_LIMIT: "10"
        run: python generate_thesis_monitor.py

      - name: Generate track_record.json
        working-directory: backend
        env:
          UNIVERSE_CSV_PATH: universe_test.csv
          FORCE_PRICE_FALLBACK: "true"
          ENABLE_HISTORY_REALIZED_ENRICHMENT: "false"
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY || secrets.TWELVE_DATA_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY || secrets.ALPHA_VANTAGE_API_KEY }}
        run: python generate_track_record.py

      - name: Generate monthly_pick.json
        working-directory: backend
        env:
          UNIVERSE_CSV_PATH: universe_test.csv
          FORCE_PRICE_FALLBACK: "true"
          ENABLE_MONTHLY_HISTORY_REALIZED_ENRICHMENT: "false"
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY || secrets.TWELVE_DATA_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY || secrets.ALPHA_VANTAGE_API_KEY }}
        run: python generate_monthly_pick.py

      - name: Validate generated output contracts
        working-directory: backend
        env:
          UNIVERSE_CSV_PATH: universe_test.csv
        run: python validate_outputs.py

      - name: Upload smoke test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-smoke-test-${{ github.run_number }}
          path: |
            backend/current_pick.json
            backend/risk_picks.json
            backend/history.json
            backend/news_scores.json
            backend/sector_scores.json
            backend/thesis_monitor.json
            backend/track_record.json
            backend/monthly_pick.json
            backend/monthly_history.json
            backend/universe_test.csv
            backend/fixtures/marketaux_smoke_news.json
            backend/fixtures/marketaux_smoke_global.json
          if-no-files-found: ignore
