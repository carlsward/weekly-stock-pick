name: Generate daily thesis monitor

on:
  schedule:
    - cron: "30 23 * * 1-5"
  workflow_dispatch:
    inputs:
      openai_model:
        description: "OpenAI model to use for world-news GPT review"
        required: false
        default: "gpt-5-mini"
        type: string
      commit_changes:
        description: "Commit refreshed thesis_monitor.json back to the repo"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  thesis-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify configuration
        env:
          MARKETAUX_API_TOKEN: ${{ secrets.MARKETAUX_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [[ -z "${MARKETAUX_API_TOKEN}" ]]; then
            echo "MARKETAUX_API_TOKEN secret is required for thesis monitoring." >&2
            exit 1
          fi
          if [[ -z "${OPENAI_API_KEY}" ]]; then
            echo "OPENAI_API_KEY secret is required for thesis monitoring." >&2
            exit 1
          fi

      - name: Generate thesis_monitor.json
        working-directory: backend
        env:
          MARKETAUX_API_TOKEN: ${{ secrets.MARKETAUX_API_TOKEN }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.openai_model || 'gpt-5-mini' }}
          ALLOW_LLM_FALLBACK: "false"
          MARKETAUX_NEWS_LIMIT: "5"
          MARKETAUX_GLOBAL_NEWS_LIMIT: "35"
          GDELT_GLOBAL_NEWS_LIMIT: "20"
          ALPHA_VANTAGE_GLOBAL_NEWS_LIMIT: "20"
          SECTOR_LLM_ARTICLE_LIMIT: "16"
        run: python generate_thesis_monitor.py

      - name: Validate thesis monitor contract
        working-directory: backend
        run: >
          python -c "from pathlib import Path;
          from validate_outputs import load_json, validate_thesis_monitor_payload;
          validate_thesis_monitor_payload(load_json(Path('thesis_monitor.json')));
          print('thesis_monitor.json contract is valid.')"

      - name: Upload thesis monitor artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-thesis-monitor-${{ github.run_number }}
          path: backend/thesis_monitor.json
          if-no-files-found: ignore

      - name: Commit and push if changed
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.commit_changes == 'true'
        run: |
          if [[ -n "$(git status --porcelain backend/thesis_monitor.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add backend/thesis_monitor.json
            git commit -m "Update thesis monitor [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
