name: Generate weekly stock pick

on:
  schedule:
    # Kör varje måndag kl 12:00 UTC inför US market week
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: python -m unittest discover -s backend/tests -t .

      - name: Verify news provider configuration
        env:
          MARKETAUX_API_TOKEN: ${{ secrets.MARKETAUX_API_TOKEN }}
        run: |
          if [[ -z "${MARKETAUX_API_TOKEN}" ]]; then
            echo "MARKETAUX_API_TOKEN secret is required for news generation." >&2
            exit 1
          fi

      - name: Generate news_scores.json
        working-directory: backend
        env:
          MARKETAUX_API_TOKEN: ${{ secrets.MARKETAUX_API_TOKEN }}
          MARKETAUX_NEWS_LIMIT: "3"
        run: python generate_news_scores.py

      - name: Generate current_pick.json and risk_picks.json
        working-directory: backend
        run: python generate_pick.py

      - name: Validate generated output contracts
        working-directory: backend
        run: python validate_outputs.py

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain backend/current_pick.json backend/risk_picks.json backend/history.json backend/news_scores.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add backend/current_pick.json backend/risk_picks.json backend/history.json backend/news_scores.json
            git commit -m "Update picks and news_scores [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
