name: Generate weekly stock pick

on:
  schedule:
    # 07:30 America/New_York on Mondays:
    # 11:30 UTC during EDT, 12:30 UTC during EST.
    - cron: "30 11 * * 1"
    - cron: "30 12 * * 1"
  workflow_dispatch:
    inputs:
      openai_model:
        description: "OpenAI model to use for world-news GPT review"
        required: false
        default: "gpt-5-mini"
        type: string
      company_news_limit:
        description: "Marketaux articles per company"
        required: false
        default: "3"
        type: string
      global_news_limit:
        description: "Broad world-news articles fetched"
        required: false
        default: "3"
        type: string
      sector_llm_article_limit:
        description: "World-news articles sent to GPT"
        required: false
        default: "20"
        type: string
      commit_changes:
        description: "Commit refreshed JSON files back to the repo"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.window.outputs.should_run }}
      ny_time: ${{ steps.window.outputs.ny_time }}

    steps:
      - name: Resolve weekly schedule window
        id: window
        env:
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          if os.getenv("GITHUB_EVENT_NAME") != "schedule":
              print("should_run=true")
              print("ny_time=manual")
              print("event_schedule=manual")
          else:
              now = datetime.now(ZoneInfo("America/New_York"))
              schedule = os.getenv("GITHUB_EVENT_SCHEDULE", "")
              utc_offset_hours = int(now.utcoffset().total_seconds() // 3600)
              expected_schedule = "30 11 * * 1" if utc_offset_hours == -4 else "30 12 * * 1"
              should_run = now.weekday() == 0 and schedule == expected_schedule
              print(f"should_run={'true' if should_run else 'false'}")
              print(f"ny_time={now.isoformat()}")
              print(f"event_schedule={schedule}")
          PY

      - name: Skip outside weekly window
        if: steps.window.outputs.should_run != 'true'
        run: |
          echo "Skipping weekly run outside the active Monday schedule. Current NY time: ${{ steps.window.outputs.ny_time }}. Triggered cron: ${{ steps.window.outputs.event_schedule }}"

  generate:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: python -m unittest discover -s backend/tests -t .

      - name: Log provider configuration
        env:
          MARKETAUX_API_TOKEN: ${{ secrets.MARKETAUX_API_TOKEN }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY || secrets.TWELVE_DATA_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY || secrets.ALPHA_VANTAGE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [[ -z "${MARKETAUX_API_TOKEN}" ]]; then
            echo "WARN: MARKETAUX_API_TOKEN is missing. Pipeline will rely on fallback news sources."
          fi
          if [[ -z "${OPENAI_API_KEY}" ]]; then
            echo "WARN: OPENAI_API_KEY is missing. Sector analysis will degrade to neutral fallback."
          fi
          if [[ -z "${TWELVEDATA_API_KEY}" ]]; then
            echo "WARN: TWELVEDATA_API_KEY is missing. Price data may fall back to Alpha Vantage or Stooq."
          fi
          if [[ -z "${ALPHA_VANTAGE_API_KEY}" ]]; then
            echo "WARN: ALPHA_VANTAGE_API_KEY is missing. Secondary news and price fallback capacity will be reduced."
          fi

      - name: Generate news_scores.json
        working-directory: backend
        env:
          ENABLE_PERSISTENT_PROVIDER_LEDGER: "true"
          PIPELINE_PROVIDER_LEDGER_PATH: "provider_budget_ledger.json"
          MARKETAUX_API_TOKEN: ${{ secrets.MARKETAUX_API_TOKEN }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY || secrets.TWELVE_DATA_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY || secrets.ALPHA_VANTAGE_API_KEY }}
          ALLOW_MARKETAUX_FALLBACK: "true"
          ALLOW_STOOQ_FALLBACK: "false"
          COMPANY_NEWS_PROVIDER_MODE: "blended"
          COMPANY_NEWS_SHORTLIST_SIZE: "15"
          ENABLE_COMPANY_LLM_REVIEW: "true"
          COMPANY_LLM_ARTICLE_LIMIT: "5"
          MARKETAUX_NEWS_LIMIT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.company_news_limit || '3' }}
          ALPHA_VANTAGE_COMPANY_REQUEST_INTERVAL_SECONDS: "12"
          ALPHA_VANTAGE_MAX_COMPANY_REQUESTS: "6"
        run: python generate_news_scores.py

      - name: Generate sector_scores.json
        working-directory: backend
        env:
          ENABLE_PERSISTENT_PROVIDER_LEDGER: "true"
          PIPELINE_PROVIDER_LEDGER_PATH: "provider_budget_ledger.json"
          MARKETAUX_API_TOKEN: ${{ secrets.MARKETAUX_API_TOKEN }}
          ALLOW_MARKETAUX_FALLBACK: "true"
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY || secrets.ALPHA_VANTAGE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.openai_model || 'gpt-5-mini' }}
          ALLOW_LLM_FALLBACK: "true"
          MARKETAUX_GLOBAL_NEWS_LIMIT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.global_news_limit || '3' }}
          SECTOR_LLM_ARTICLE_LIMIT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.sector_llm_article_limit || '20' }}
        run: python generate_sector_scores.py

      - name: Generate current_pick.json and risk_picks.json
        working-directory: backend
        env:
          ENABLE_PERSISTENT_PROVIDER_LEDGER: "true"
          PIPELINE_PROVIDER_LEDGER_PATH: "provider_budget_ledger.json"
          ENABLE_HISTORY_REALIZED_ENRICHMENT: "true"
          ALLOW_STOOQ_FALLBACK: "false"
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY || secrets.TWELVE_DATA_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY || secrets.ALPHA_VANTAGE_API_KEY }}
          ALPHA_VANTAGE_REQUEST_INTERVAL_SECONDS: "12"
          ALPHA_VANTAGE_MAX_PRICE_REQUESTS: "4"
        run: python generate_pick.py

      - name: Generate thesis_monitor.json
        working-directory: backend
        env:
          ENABLE_PERSISTENT_PROVIDER_LEDGER: "true"
          PIPELINE_PROVIDER_LEDGER_PATH: "provider_budget_ledger.json"
          MARKETAUX_API_TOKEN: ${{ secrets.MARKETAUX_API_TOKEN }}
          ALLOW_MARKETAUX_FALLBACK: "true"
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY || secrets.TWELVE_DATA_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY || secrets.ALPHA_VANTAGE_API_KEY }}
          COMPANY_NEWS_PROVIDER_MODE: "blended"
          ENABLE_COMPANY_LLM_REVIEW: "true"
          COMPANY_LLM_ARTICLE_LIMIT: "5"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.openai_model || 'gpt-5-mini' }}
          ALLOW_LLM_FALLBACK: "true"
          MARKETAUX_NEWS_LIMIT: "3"
          MARKETAUX_GLOBAL_NEWS_LIMIT: "3"
          GDELT_GLOBAL_NEWS_LIMIT: "20"
          ALPHA_VANTAGE_GLOBAL_NEWS_LIMIT: "20"
          SECTOR_LLM_ARTICLE_LIMIT: "16"
          ALPHA_VANTAGE_COMPANY_REQUEST_INTERVAL_SECONDS: "12"
          ALPHA_VANTAGE_MAX_COMPANY_REQUESTS: "2"
          ALLOW_STOOQ_FALLBACK: "false"
          ALPHA_VANTAGE_REQUEST_INTERVAL_SECONDS: "12"
          ALPHA_VANTAGE_MAX_PRICE_REQUESTS: "2"
        run: python generate_thesis_monitor.py

      - name: Generate track_record.json
        working-directory: backend
        env:
          ENABLE_PERSISTENT_PROVIDER_LEDGER: "true"
          PIPELINE_PROVIDER_LEDGER_PATH: "provider_budget_ledger.json"
          ENABLE_HISTORY_REALIZED_ENRICHMENT: "true"
          ALLOW_STOOQ_FALLBACK: "false"
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY || secrets.TWELVE_DATA_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY || secrets.ALPHA_VANTAGE_API_KEY }}
          ALPHA_VANTAGE_REQUEST_INTERVAL_SECONDS: "12"
          ALPHA_VANTAGE_MAX_PRICE_REQUESTS: "3"
        run: python generate_track_record.py

      - name: Validate generated output contracts
        working-directory: backend
        run: python validate_outputs.py --only weekly

      - name: Upload generated backend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-weekly-pick-${{ github.run_number }}
          path: |
            backend/current_pick.json
            backend/risk_picks.json
            backend/history.json
            backend/news_scores.json
            backend/sector_scores.json
            backend/thesis_monitor.json
            backend/track_record.json
            backend/provider_budget_ledger.json
          if-no-files-found: ignore

      - name: Commit and push if changed
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.commit_changes == 'true'
        run: |
          if [[ -n "$(git status --porcelain backend/current_pick.json backend/risk_picks.json backend/history.json backend/news_scores.json backend/sector_scores.json backend/thesis_monitor.json backend/track_record.json backend/provider_budget_ledger.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add backend/current_pick.json backend/risk_picks.json backend/history.json backend/news_scores.json backend/sector_scores.json backend/thesis_monitor.json backend/track_record.json backend/provider_budget_ledger.json
            git commit -m "Update picks, monitor, and track record [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
